services:

  # ────────────────────────────
  # Base de datos
  # ────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: postgres-db
    restart: unless-stopped
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_DB:       ${DB_DB}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ────────────────────────────
  # API Node + TypeScript
  # ────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: rest-api
    restart: unless-stopped
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      NODE_ENV:     production
      APP_PORT:     ${APP_PORT}
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_DB:        ${DB_DB}
      DB_USER:      ${DB_USER}
      DB_PASSWORD:  ${DB_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -qO- http://localhost:${APP_PORT}/api/v1/products || exit 1"]
    #   interval: 30s
    #   timeout:  5s
    #   retries:  3

volumes:
  postgres_data: